<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section>
        <div class="infos">
          <div class="info">
            <h3>
              High Score:
              <span id="highScore">0</span>
            </h3>
          </div>
          <div class="info">
            <h3>
              Score:
              <span id="score">0</span>
            </h3>
          </div>
          <div class="info">
            <h3>
              Time:
              <span id="time">00:00</span>
            </h3>
          </div>
        </div>
        <div class="board"></div>
      </section>

      <!-- Start Modal -->
      <div class="modal-overlay" id="startModal">
        <h1>Welcome To Snake Game</h1>
        <button class="modal-btn" id="startBtn">Start Game</button>
      </div>

      <!-- Game Over Modal -->
      <div class="modal-overlay" id="gameOverModal" style="display: none;">
        <h1>Game Over</h1>
        <button class="modal-btn" id="restartBtn">Restart</button>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
